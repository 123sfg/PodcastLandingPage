<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Smart Drive</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="./logo page.png" alt="Podcast logo">
        </div>

        <nav>
            <ul>
                <li><a href="./home.html">Home</a></li>
                <li><a href="./about_us.html">About Us</a></li>
                <li><a href="./podcast.html">Podcast</a></li>
                <li><a href="./episode.html">Episode</a></li>
                <li><a href="./contactus.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact_us">

            <div class="left">
                <h1>Contact Us</h1>
                <p class="lead">
                    Have questions about electric cars or our latest episode?
                    Send us a message and we’ll get back to you soon.
                </p>
            </div>

            <div class="right">
                <form class="contact-form">

                    <input type="email" placeholder="Email" required>
                    <input type="text" placeholder="Subject" required>
                    <textarea placeholder="Write your message..." rows="5" required></textarea>

                    <button type="submit" class="btn">Send Message</button>

                </form>
            </div>

        </section>
    </main>

</body>
</html>
